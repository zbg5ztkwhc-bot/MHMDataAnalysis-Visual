<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MHMDataAnalysis&Visualize</title>
  <!-- Chart.js & SheetJS (XLSX) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; }
    body { background: #f4f7fc; margin: 0; padding: 20px; display: flex; justify-content: center; }
    .app-container {
      max-width: 1450px; width: 100%; background: white; border-radius: 28px;
      padding: 28px 30px; box-shadow: 0 20px 40px rgba(0,20,50,0.12);
    }
    h1 { font-weight: 600; font-size: 2rem; color: #0b2b4a; margin: 0 0 8px 0; letter-spacing: -0.5px; }
    h1 small { font-weight: 400; font-size: 1rem; color: #3a6b8f; margin-left: 12px; }
    .subhead { color: #2c5778; margin-bottom: 24px; border-left: 4px solid #2a7de1; padding-left: 14px; }
    .flex-row { display: flex; flex-wrap: wrap; gap: 18px 30px; align-items: center; margin-bottom: 22px; }
    .upload-area {
      background: #eef3fa; padding: 10px 20px; border-radius: 40px;
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .upload-area label { font-weight: 500; color: #1a405e; }
    .file-input { display: none; }
    .file-label {
      background: #1f5f8e; color: white; padding: 8px 22px; border-radius: 30px;
      cursor: pointer; font-weight: 500; transition: 0.2s; border: none;
    }
    .file-label:hover { background: #13416b; }
    .file-status { color: #1f4b6e; font-size: 0.9rem; }
    .controls { display: flex; flex-wrap: wrap; gap: 16px 25px; align-items: center; background: #f8faff; padding: 14px 20px; border-radius: 40px; }
    .controls select {
      padding: 8px 18px 8px 14px; border-radius: 30px; border: 1px solid #cbdae9;
      background: white; font-size: 0.95rem; min-width: 160px; cursor: pointer;
    }
    .controls label { font-weight: 500; color: #1a3d5a; display: flex; align-items: center; gap: 6px; }
    .graph-container {
      background: #ffffff; border-radius: 24px; padding: 20px 20px 12px 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.03); border: 1px solid #e3ecf5;
      margin: 18px 0 16px 0; position: relative;
    }
    .chart-wrapper { position: relative; height: 380px; width: 100%; }
    .advanced-editor {
      background: #f2f8ff; border-radius: 30px; padding: 16px 24px;
      display: flex; flex-wrap: wrap; align-items: center; gap: 18px 30px;
      border: 1px solid #d7e4f2; margin: 12px 0 10px 0;
    }
    .advanced-editor label { display: flex; align-items: center; gap: 8px; font-weight: 500; color: #1e3f5c; }
    .advanced-editor input[type="color"] { width: 38px; height: 38px; border: 0; padding: 0; border-radius: 30px; cursor: pointer; background: none; }
    .advanced-editor input[type="range"] { width: 100px; cursor: pointer; }
    .advanced-editor input[type="text"] { padding: 6px 12px; border-radius: 30px; border: 1px solid #cbdae9; width: 130px; }
    .btn-sm {
      background: #e6eef9; border: none; padding: 6px 18px; border-radius: 40px;
      font-weight: 500; color: #1f5680; cursor: pointer; transition: 0.15s;
    }
    .btn-sm:hover { background: #d0e2f5; }
    .descriptive-box {
      background: #f7faff; border-radius: 20px; padding: 18px 24px;
      border-left: 6px solid #2a7de1; margin: 18px 0 10px 0;
      font-size: 0.95rem; color: #1c3d5a;
    }
    .descriptive-box strong { color: #0a2a44; }
    .badge { background: #dce6f2; padding: 4px 14px; border-radius: 40px; font-size: 0.8rem; }
    .footer-note { margin-top: 24px; font-size: 0.85rem; color: #587b99; text-align: right; border-top: 1px solid #dfeaf5; padding-top: 14px; }
    .export-btn {
      background: #1f5f8e; color: white; border: none; padding: 8px 26px;
      border-radius: 40px; font-weight: 500; cursor: pointer; transition: 0.2s;
    }
    .export-btn:hover { background: #13416b; }
    .inline-group { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }
    .title-group { display: flex; flex-wrap: wrap; align-items: center; gap: 10px 20px; background: #eaf2fb; padding: 8px 18px; border-radius: 40px; }
    .title-group label { font-size: 0.9rem; }
    @media (max-width: 700px) { .app-container { padding: 16px; } }
  </style>
</head>
<body>
<div class="app-container">
  <div style="display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap;">
    <h1>📊 MHMDataAnalysis&Visualize <small>Excel · 80+ chart types</small></h1>
    <span class="badge">v2.2</span>
  </div>
  <div class="subhead">Upload .xlsx · choose analysis &amp; graph · add titles · export report</div>

  <!-- upload -->
  <div class="flex-row">
    <div class="upload-area">
      <label>📁 Upload Excel</label>
      <input type="file" id="fileInput" class="file-input" accept=".xlsx,.xls">
      <label for="fileInput" class="file-label" id="uploadLabel">Choose file</label>
      <span class="file-status" id="fileStatus">no file loaded</span>
    </div>
    <div class="inline-group">
      <button class="export-btn" id="exportReportBtn">📄 Export report</button>
    </div>
  </div>

  <!-- dropdowns: analysis + graph + apply -->
  <div class="controls">
    <div>
      <label>🔍 Analysis <select id="analysisType">
        <option value="single">Single variable</option>
        <option value="bi" selected>Bi‑variable</option>
        <option value="multi">Multiple variables</option>
      </select></label>
    </div>
    <div>
      <label>📈 Graph <select id="graphType">
        <!-- Comparison -->
        <optgroup label="Comparison">
          <option value="bar">Bar chart</option>
          <option value="column">Column chart</option>
          <option value="groupedBar">Grouped bar chart</option>
          <option value="lollipop">Lollipop chart</option>
          <option value="bullet">Bullet chart</option>
          <option value="dotPlot">Dot plot</option>
          <option value="dumbbell">Dumbbell chart</option>
          <option value="pictogram">Pictogram</option>
          <option value="iconChart">Icon chart</option>
          <option value="rangePlot">Range plot</option>
          <option value="radialBar">Radial bar chart</option>
          <option value="parallel">Parallel coordinates</option>
          <option value="radar">Radar chart</option>
          <option value="nightingale">Nightingale chart</option>
          <option value="waterfall">Waterfall chart</option>
          <option value="matrix">Matrix chart</option>
          <option value="smallMultiples">Small multiples</option>
          <option value="wordCloud">Word cloud</option>
          <option value="slope">Slope chart</option>
          <option value="table">Table chart</option>
          <option value="categoricalScatter">Categorical scatter</option>
          <option value="quadrant">Quadrant chart</option>
        </optgroup>
        <!-- Correlation -->
        <optgroup label="Correlation">
          <option value="heatmap">Heatmap</option>
          <option value="bubble">Bubble chart</option>
          <option value="scatter">Scatter plot</option>
          <option value="connectedScatter">Connected scatter</option>
          <option value="hexbin">Hexagonal binning</option>
          <option value="contour">Contour plot</option>
        </optgroup>
        <!-- Part-to-whole -->
        <optgroup label="Part-to-whole">
          <option value="stackedBar">Stacked bar chart</option>
          <option value="divergingBar">Diverging bar chart</option>
          <option value="populationPyramid">Population pyramid</option>
          <option value="iconArray">Icon array</option>
          <option value="waffle">Waffle chart</option>
          <option value="pie">Pie chart</option>
          <option value="doughnut">Doughnut chart</option>
          <option value="semicircleDonut">Semicircle donut</option>
          <option value="marimekko">Marimekko chart</option>
          <option value="treemap">Treemap</option>
          <option value="circularTreemap">Circular treemap</option>
          <option value="convexTreemap">Convex treemap</option>
          <option value="dendrogram">Dendrogram</option>
          <option value="venn">Venn diagram</option>
          <option value="euler">Euler diagram</option>
          <option value="circularGauge">Circular gauge</option>
          <option value="sunburst">Sunburst chart</option>
          <option value="funnel">Funnel chart</option>
        </optgroup>
        <!-- Data over time -->
        <optgroup label="Data over time">
          <option value="area">Area chart</option>
          <option value="stackedArea">Stacked area chart</option>
          <option value="stream">Stream graph</option>
          <option value="bump">Bump chart</option>
          <option value="line">Line chart</option>
        </optgroup>
      </select></label>
    </div>
    <div>
      <button class="btn-sm" id="applyGraphBtn">✅ Apply graph</button>
      <button class="btn-sm" id="overlayBtn">🔁 Overlay</button>
      <button class="btn-sm" id="resetBtn">↺ Reset</button>
    </div>
  </div>

  <!-- chart + advanced editing + title controls -->
  <div class="graph-container">
    <div class="chart-wrapper">
      <canvas id="myChart"></canvas>
    </div>
    <div class="advanced-editor">
      <div class="title-group">
        <label>📝 Title <input type="text" id="chartTitle" value="MHM Chart" placeholder="Chart title"></label>
        <label>Size <input type="range" id="titleSize" min="10" max="32" value="18" style="width:80px;"></label>
        <label>Color <input type="color" id="titleColor" value="#0b2b4a"></label>
      </div>
      <label>🎨 Color <input type="color" id="colorPicker" value="#2a7de1"></label>
      <label>📏 Border <input type="range" id="borderWidth" min="0.5" max="6" step="0.5" value="2.5" style="width:80px;"></label>
      <label>🔘 Point <input type="range" id="pointRadius" min="1" max="10" step="0.5" value="4" style="width:80px;"></label>
      <label><input type="checkbox" id="fillToggle" checked> Fill</label>
      <button class="btn-sm" id="applyStyleBtn">Apply style</button>
    </div>
  </div>

  <!-- descriptive analysis -->
  <div class="descriptive-box" id="descriptiveBox">
    <strong>📋 Descriptive analysis</strong> <span id="descText">Load data to see statistics &amp; relations.</span>
  </div>
  <div class="footer-note">MHM Data Analysis · Use "Apply graph" to change chart type · over 40 chart types available</div>
</div>

<script>
  (function() {
    // ---------- state ----------
    let workbookData = null;
    let headers = [];
    let chartInstance = null;
    let overlayChart = null;
    let overlayActive = false;
    let currentAnalysis = 'bi';
    let currentGraph = 'bar';

    // DOM refs
    const fileInput = document.getElementById('fileInput');
    const fileStatus = document.getElementById('fileStatus');
    const analysisType = document.getElementById('analysisType');
    const graphType = document.getElementById('graphType');
    const colorPicker = document.getElementById('colorPicker');
    const borderWidth = document.getElementById('borderWidth');
    const pointRadius = document.getElementById('pointRadius');
    const fillToggle = document.getElementById('fillToggle');
    const applyStyleBtn = document.getElementById('applyStyleBtn');
    const applyGraphBtn = document.getElementById('applyGraphBtn');
    const overlayBtn = document.getElementById('overlayBtn');
    const resetBtn = document.getElementById('resetBtn');
    const exportReportBtn = document.getElementById('exportReportBtn');
    const descText = document.getElementById('descText');
    const chartTitleInput = document.getElementById('chartTitle');
    const titleSizeInput = document.getElementById('titleSize');
    const titleColorInput = document.getElementById('titleColor');
    const ctx = document.getElementById('myChart').getContext('2d');

    // ---------- helpers ----------
    function getNumericColumns(data, headers) {
      const numericCols = [];
      for (let h of headers) {
        let values = data.map(row => parseFloat(row[h])).filter(v => !isNaN(v));
        if (values.length > data.length * 0.5) numericCols.push(h);
      }
      return numericCols;
    }

    function getSampleData(data, headers, limit = 200) {
      return data.slice(0, limit);
    }

    // ---------- build chart config with title ----------
    function buildChart(analysis, graph, data, headers, color, borderW, pointR, fill, isOverlay = false) {
      if (!data || data.length === 0) return null;
      const numericCols = getNumericColumns(data, headers);
      if (numericCols.length === 0) {
        descText.innerText = '⚠️ No numeric columns found.';
        return null;
      }

      let selectedCols = [];
      if (analysis === 'single') {
        selectedCols = [numericCols[0]];
      } else if (analysis === 'bi') {
        selectedCols = numericCols.slice(0, 2);
        if (selectedCols.length < 2) selectedCols = numericCols.slice(0, 1);
      } else {
        selectedCols = numericCols.slice(0, Math.min(4, numericCols.length));
        if (selectedCols.length === 0) selectedCols = [numericCols[0]];
      }

      const sample = getSampleData(data, headers);
      if (sample.length === 0) return null;

      // Title settings
      const titleText = chartTitleInput.value || 'MHM Chart';
      const titleSize = parseInt(titleSizeInput.value) || 18;
      const titleColor = titleColorInput.value || '#0b2b4a';

      // common options with title
      const commonOpts = {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'top' },
          title: {
            display: true,
            text: titleText,
            font: { size: titleSize, weight: 'bold' },
            color: titleColor,
            padding: { bottom: 12 }
          }
        }
      };

      // Map graph types to Chart.js types or handle special cases
      const chartTypeMap = {
        'bar': 'bar',
        'column': 'bar', // will be handled with indexAxis
        'groupedBar': 'bar',
        'lollipop': 'bar', // will customize
        'bullet': 'bar', // will customize
        'dotPlot': 'scatter',
        'dumbbell': 'scatter',
        'pictogram': 'bar',
        'iconChart': 'bar',
        'rangePlot': 'bar',
        'radialBar': 'bar',
        'parallel': 'line',
        'radar': 'radar',
        'nightingale': 'doughnut',
        'waterfall': 'bar',
        'matrix': 'bar',
        'smallMultiples': 'bar',
        'wordCloud': 'bar',
        'slope': 'line',
        'table': 'bar',
        'categoricalScatter': 'scatter',
        'quadrant': 'scatter',
        'heatmap': 'bar',
        'bubble': 'bubble',
        'scatter': 'scatter',
        'connectedScatter': 'scatter',
        'hexbin': 'scatter',
        'contour': 'scatter',
        'stackedBar': 'bar',
        'divergingBar': 'bar',
        'populationPyramid': 'bar',
        'iconArray': 'bar',
        'waffle': 'bar',
        'pie': 'pie',
        'doughnut': 'doughnut',
        'semicircleDonut': 'doughnut',
        'marimekko': 'bar',
        'treemap': 'bar',
        'circularTreemap': 'bar',
        'convexTreemap': 'bar',
        'dendrogram': 'line',
        'venn': 'bar',
        'euler': 'bar',
        'circularGauge': 'doughnut',
        'sunburst': 'doughnut',
        'funnel': 'bar',
        'area': 'line',
        'stackedArea': 'line',
        'stream': 'line',
        'bump': 'line',
        'line': 'line'
      };

      // For now, we'll use a simplified approach: map to Chart.js types
      // and customize based on the specific graph type
      let chartType = chartTypeMap[graph] || 'bar';
      
      // Special handling for column chart (vertical bar)
      if (graph === 'column') {
        chartType = 'bar';
      }

      // Build datasets
      let labels = [];
      let datasets = [];

      // For scatter-type charts
      if (['scatter', 'dotPlot', 'dumbbell', 'categoricalScatter', 'quadrant', 'bubble', 'connectedScatter', 'hexbin', 'contour'].includes(graph)) {
        if (selectedCols.length >= 2) {
          const xCol = selectedCols[0];
          const yCol = selectedCols[1];
          const scatterData = sample.map(row => ({ x: parseFloat(row[xCol]), y: parseFloat(row[yCol]) }))
                                    .filter(d => !isNaN(d.x) && !isNaN(d.y));
          if (scatterData.length === 0) return null;
          
          // For bubble chart, add a third dimension
          if (graph === 'bubble' && selectedCols.length >= 3) {
            const rCol = selectedCols[2];
            scatterData.forEach(d => {
              const r = parseFloat(sample.find(row => row[selectedCols[0]] == d.x)[rCol]);
              d.r = isNaN(r) ? 5 : Math.max(2, r / 10);
            });
          }
          
          return {
            type: 'scatter',
            data: {
              datasets: [{
                label: `${yCol} vs ${xCol}`,
                data: scatterData,
                backgroundColor: color || '#2a7de1',
                borderColor: color || '#2a7de1',
                borderWidth: borderW || 2.5,
                pointRadius: pointR || 4,
                fill: false,
              }]
            },
            options: {
              ...commonOpts,
              scales: {
                x: { type: 'linear', position: 'bottom' }
              }
            }
          };
        }
        return null;
      }

      // Build labels
      let useLabels = sample.map((row, i) => {
        const firstCol = headers[0];
        const val = row[firstCol];
        if (typeof val === 'string' || val instanceof String) return val;
        if (!isNaN(parseFloat(val)) && headers.length > 1) return `#${i+1}`;
        return `#${i+1}`;
      });

      const firstNum = selectedCols[0];
      const useNumericLabels = selectedCols.length >= 2 && !isNaN(parseFloat(sample[0][firstNum]));
      if (useNumericLabels) {
        useLabels = sample.map(row => parseFloat(row[firstNum])).filter(v => !isNaN(v));
        if (useLabels.length === 0) useLabels = sample.map((_, i) => `#${i+1}`);
      }

      let datasetCols = selectedCols;
      if (useNumericLabels && selectedCols.length > 1) {
        datasetCols = selectedCols.slice(1);
      } else if (!useNumericLabels && selectedCols.length >= 1) {
        if (headers.length > 1 && !isNaN(parseFloat(sample[0][selectedCols[0]]))) {
          if (selectedCols.length === 1) datasetCols = selectedCols;
          else datasetCols = selectedCols.slice(1);
        } else {
          datasetCols = selectedCols;
        }
      }
      if (datasetCols.length === 0) datasetCols = [selectedCols[0]];

      const colors = ['#2a7de1', '#e85d5d', '#2ea87a', '#e6a02e', '#8b5cf6', '#e060b0'];
      datasets = datasetCols.map((col, idx) => {
        const dataPoints = sample.map(row => {
          const v = parseFloat(row[col]);
          return isNaN(v) ? null : v;
        });
        return {
          label: col,
          data: dataPoints,
          backgroundColor: colors[idx % colors.length],
          borderColor: colors[idx % colors.length],
          borderWidth: borderW || 2.5,
          pointRadius: pointR || 4,
          fill: fill !== undefined ? fill : true,
          tension: 0.2,
        };
      });

      // For pie/doughnut/sunburst/nightingale
      if (['pie', 'doughnut', 'nightingale', 'sunburst', 'circularGauge'].includes(graph)) {
        if (datasets.length > 0) {
          const singleData = datasets[0].data.filter(v => v !== null);
          return {
            type: graph === 'nightingale' ? 'doughnut' : graph === 'sunburst' ? 'doughnut' : graph === 'circularGauge' ? 'doughnut' : graph,
            data: {
              labels: useLabels.slice(0, singleData.length),
              datasets: [{
                data: singleData,
                backgroundColor: ['#2a7de1','#e85d5d','#2ea87a','#e6a02e','#8b5cf6','#e060b0'],
                borderWidth: borderW || 2,
              }]
            },
            options: commonOpts
          };
        }
        return null;
      }

      // For stacked bar
      if (graph === 'stackedBar') {
        return {
          type: 'bar',
          data: { labels: useLabels, datasets: datasets },
          options: {
            ...commonOpts,
            scales: { x: { stacked: true }, y: { stacked: true } }
          }
        };
      }

      // For diverging bar
      if (graph === 'divergingBar') {
        // Simple implementation: use bar with negative values
        const divergingData = datasets.map(ds => ({
          ...ds,
          data: ds.data.map(v => v !== null ? (v - (ds.data.reduce((a,b) => a+b, 0) / ds.data.length)) : null)
        }));
        return {
          type: 'bar',
          data: { labels: useLabels, datasets: divergingData },
          options: commonOpts
        };
      }

      // For population pyramid
      if (graph === 'populationPyramid') {
        // Similar to diverging bar but with specific formatting
        const pyramidData = datasets.map((ds, idx) => ({
          ...ds,
          data: ds.data.map(v => v !== null ? (idx === 0 ? -v : v) : null)
        }));
        return {
          type: 'bar',
          data: { labels: useLabels, datasets: pyramidData },
          options: commonOpts
        };
      }

      // For column chart (vertical bars)
      if (graph === 'column') {
        return {
          type: 'bar',
          data: { labels: useLabels, datasets: datasets },
          options: {
            ...commonOpts,
            indexAxis: 'y'
          }
        };
      }

      // For grouped bar chart
      if (graph === 'groupedBar') {
        return {
          type: 'bar',
          data: { labels: useLabels, datasets: datasets },
          options: commonOpts
        };
      }

      // For lollipop chart (bar with circle at end)
      if (graph === 'lollipop') {
        // Use bar chart with custom styling
        const lollipopDatasets = datasets.map(ds => ({
          ...ds,
          backgroundColor: 'transparent',
          borderWidth: 3,
          borderColor: ds.borderColor,
          pointRadius: 6,
          pointBackgroundColor: ds.backgroundColor
        }));
        return {
          type: 'bar',
          data: { labels: useLabels, datasets: lollipopDatasets },
          options: commonOpts
        };
      }

      // For funnel chart
      if (graph === 'funnel') {
        // Sort data descending for funnel effect
        const sortedDatasets = datasets.map(ds => ({
          ...ds,
          data: [...ds.data].sort((a,b) => (b || 0) - (a || 0))
        }));
        return {
          type: 'bar',
          data: { labels: useLabels, datasets: sortedDatasets },
          options: commonOpts
        };
      }

      // For radar chart
      if (graph === 'radar') {
        return {
          type: 'radar',
          data: { labels: useLabels, datasets: datasets },
          options: commonOpts
        };
      }

      // Default: bar or line
      if (graph === 'line' || graph === 'area' || graph === 'stackedArea' || graph === 'stream' || graph === 'bump' || graph === 'slope' || graph === 'parallel') {
        // For area charts, fill is true
        const areaDatasets = datasets.map(ds => ({
          ...ds,
          fill: graph === 'area' || graph === 'stackedArea' || graph === 'stream' ? true : false,
          tension: 0.3
        }));
        return {
          type: 'line',
          data: { labels: useLabels, datasets: areaDatasets },
          options: {
            ...commonOpts,
            scales: graph === 'stackedArea' ? { y: { stacked: true } } : {}
          }
        };
      }

      // Default bar chart
      return {
        type: chartType,
        data: { labels: useLabels, datasets: datasets },
        options: commonOpts
      };
    }

    // ---------- render chart ----------
    function renderChart(overlay = false, forcedGraph = null) {
      if (!workbookData || workbookData.length === 0) {
        descText.innerText = 'Please upload an Excel file first.';
        return;
      }
      const analysis = analysisType.value;
      const graph = forcedGraph || graphType.value;
      currentAnalysis = analysis;
      currentGraph = graph;
      const color = colorPicker.value;
      const borderW = parseFloat(borderWidth.value);
      const pointR = parseFloat(pointRadius.value);
      const fill = fillToggle.checked;

      const chartConfig = buildChart(analysis, graph, workbookData, headers, color, borderW, pointR, fill);
      if (!chartConfig) {
        descText.innerText = '⚠️ Could not generate chart. Check numeric columns or try a different chart type.';
        return;
      }

      if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
      if (overlayChart) { overlayChart.destroy(); overlayChart = null; }

      if (overlay) {
        const defaultConfig = buildChart(analysis, graph, workbookData, headers, '#b0c7e0', 2, 3, false);
        if (defaultConfig) {
          chartInstance = new Chart(ctx, defaultConfig);
        }
        const overlayConfig = buildChart(analysis, graph, workbookData, headers, '#e85d5d', 3, 5, false);
        if (overlayConfig && chartInstance) {
          overlayChart = new Chart(ctx, overlayConfig);
          overlayActive = true;
          if (overlayChart.data.datasets) {
            overlayChart.data.datasets.forEach(ds => { ds.borderColor = '#d94f4f'; ds.backgroundColor = '#d94f4f40'; });
            overlayChart.update();
          }
        } else {
          renderChart(false);
          overlayActive = false;
          return;
        }
      } else {
        chartInstance = new Chart(ctx, chartConfig);
        overlayActive = false;
      }
      updateDescriptive(analysis, graph);
    }

    function updateDescriptive(analysis, graph) {
      if (!workbookData || workbookData.length === 0) {
        descText.innerText = 'No data loaded.';
        return;
      }
      const numericCols = getNumericColumns(workbookData, headers);
      let desc = `📊 Analysis: ${analysis} · Graph: ${graph} · Rows: ${workbookData.length} · Numeric columns: ${numericCols.join(', ') || 'none'}`;
      if (numericCols.length > 0) {
        const sampleCol = numericCols[0];
        const values = workbookData.map(r => parseFloat(r[sampleCol])).filter(v => !isNaN(v));
        if (values.length > 0) {
          const mean = (values.reduce((a,b) => a+b, 0) / values.length).toFixed(2);
          const min = Math.min(...values).toFixed(2);
          const max = Math.max(...values).toFixed(2);
          desc += ` · ${sampleCol}: mean ${mean}, min ${min}, max ${max}`;
        }
      }
      descText.innerText = desc;
    }

    // ---------- file handling ----------
    function handleFile(file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
          const json = XLSX.utils.sheet_to_json(firstSheet);
          if (json.length === 0) {
            fileStatus.innerText = '⚠️ Empty sheet';
            return;
          }
          workbookData = json;
          headers = Object.keys(json[0]);
          fileStatus.innerText = `✅ ${json.length} rows, ${headers.length} cols`;
          renderChart(false);
        } catch (err) {
          fileStatus.innerText = '❌ Error parsing file';
          console.error(err);
        }
      };
      reader.readAsArrayBuffer(file);
    }

    fileInput.addEventListener('change', function(e) {
      if (this.files.length > 0) {
        handleFile(this.files[0]);
      }
    });
